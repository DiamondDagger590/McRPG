name: AI PR Review

"on":
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master, develop, recode]

jobs:
  # ------------------------------------------------------------------
  # Step 1: Detect which domains were touched so we only invoke the
  # relevant personas. Each output is the string "true" or "false".
  # ------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      needs_gui: ${{ steps.detect.outputs.gui }}
      needs_config: ${{ steps.detect.outputs.config }}
      needs_api: ${{ steps.detect.outputs.api }}
      needs_test: ${{ steps.detect.outputs.test }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: Detect changed file domains
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || git diff --name-only origin/${{ github.base_ref }}...HEAD)

          echo "$CHANGED"

          gui=false
          config=false
          api=false
          test=false

          while IFS= read -r f; do
            [[ "$f" =~ src/.*/gui/.*\.java ]]        && gui=true
            [[ "$f" =~ resources/localization/ ]]     && gui=true
            [[ "$f" =~ resources/.*\.yml ]]           && config=true
            [[ "$f" =~ configuration/.*\.java ]]      && config=true
            [[ "$f" =~ src/.*/event/.*\.java ]]       && api=true
            [[ "$f" =~ src/.*/registry/.*\.java ]]    && api=true
            [[ "$f" =~ src/main/.*\.java ]]           && test=true
          done <<< "$CHANGED"

          echo "gui=$gui"       >> "$GITHUB_OUTPUT"
          echo "config=$config" >> "$GITHUB_OUTPUT"
          echo "api=$api"       >> "$GITHUB_OUTPUT"
          echo "test=$test"     >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Step 2: Generate diff and upload it with metadata as an artifact
  # so the secret-holding workflow_run job never executes PR head code.
  # ------------------------------------------------------------------
  prepare-review:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      needs.detect-changes.outputs.needs_gui    == 'true' ||
      needs.detect-changes.outputs.needs_config == 'true' ||
      needs.detect-changes.outputs.needs_api    == 'true' ||
      needs.detect-changes.outputs.needs_test   == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff and save metadata
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          git diff "$BASE" "$HEAD" > pr.diff 2>/dev/null || \
            git diff origin/${{ github.base_ref }}...HEAD > pr.diff

          cat > review-meta.json << 'EOF_META'
          {
            "pr_number": "${{ github.event.pull_request.number }}",
            "needs_gui": "${{ needs.detect-changes.outputs.needs_gui }}",
            "needs_config": "${{ needs.detect-changes.outputs.needs_config }}",
            "needs_api": "${{ needs.detect-changes.outputs.needs_api }}",
            "needs_test": "${{ needs.detect-changes.outputs.needs_test }}"
          }
          EOF_META

      - name: Upload review inputs
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-inputs
          path: |
            pr.diff
            review-meta.json
          retention-days: 1
