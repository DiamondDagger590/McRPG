#######################################
#
# English localization for McRPG abilities.
# This file is part of the English (en) locale.
#
#######################################
locale: en
config-version: 1
# Configure ability placeholders, display items and other text/items.
ability:
  # Configure messages relating to abilities that can be on cooldown
  cooldown:
    # The message to send to the player when they try to use an ability still on cooldown
    # Supports <ability> as a placeholder for the ability on cooldown.
    ability-still-on-cooldown: "<red><ability> is still on cooldown."
    # The message to send to the player whenever an ability is no longer on cooldown
    # Supports <ability> as a placeholder for the ability that was on cooldown.
    ability-no-longer-on-cooldown: "<gold><ability> <gray>is now off cooldown!"
  # Configure messages for when abilities are readied or unreadied.
  ready:
    # Messages for the Herbalism skill
    herbalism:
      ready-message: "<gray>You raise your hoe."
      unready-message: "<gray>You lower your hoe."
    # Messages for the Mining skill
    mining:
      ready-message: "<gray>You ready your pickaxe."
      unready-message: "<gray>You lower your pickaxe."
    # Messages for the Swords skill
    swords:
      ready-message: "<gray>You raise your sword."
      unready-message: "<gray>You lower your sword."
    # Messages for the Woodcutting skill
    woodcutting:
      ready-message: "<gray>You raise your axe."
      unready-message: "<gray>You lower your axe."
  # Configure messages for when abilities are unlocked
  # Supports <ability> as a placeholder for the ability name
  unlock:
    # The message to send when a player unlocks a new ability
    ability-unlocked: "<green>You have unlocked a new ability! <ability> <green>is now available for use."
    # The message to send when an ability is automatically added to the player's loadout
    ability-added-to-loadout: "<green>The new ability has automatically been added to your current loadout."
    # The message to send when an ability cannot be added because there's already an active ability for that skill
    # Supports <skill> and <ability> placeholders
    ability-not-added-duplicate-skill: "<red>You already have an active ability for the skill <skill> <red>in your loadout, so <ability> <red>was not automatically added."
  # Configure additional lore lines for ability items that will be appended to ability item lore when conditions are met
  lore:
    # Configure ability upgrade quest lore
    # The following placeholders are supported: <ability-points>, <next-tier-ability-points>, <upgrade-quest-progress>
    quest:
      # The lore to add when an ability can be upgraded via upgrade quest but the player lacks enough ability points
      not-enough-ability-points:
        - '<gray>You need <gold><next-tier-ability-points> ability points<gray> to start the upgrade quest.'
      #  The lore to add to prompt a player to click when an ability can be upgraded via upgrade quest
      click-to-start:
        - '<green>Click to spend <gold><next-tier-upgrade-points> upgrade points</gold> to start upgrade quest.'
      # The lore to add when an ability has an active upgrade quest
      quest-progress:
        - '<gray>Upgrade Quest Progress: <upgrade-quest-progress>'
    # The lore to add when the player isn't high enough level to upgrade the ability.
    # The following placeholders are supported: <upgrade-points>, <next-tier-level>
    upgrade-locked-behind-levelup:
      - '<gray>You can upgrade this ability once you reach <gold>Lv <next-tier-level><gray> in <gold>>skill><gray>.'
    # The lore to add to show how many upgrade points the player has.
    # The following placeholders are supported: <ability-point-count>
    ability-point-count:
      - '<gray>You currently have <gold><ability-point-count></gold> upgrade points.'
    ability-locked:
      - '<gray>Unlock this ability when your <gold><skill></gold> skill'
      - '<gray>reaches level <gold><ability-unlock-level></gold>.'
    # The lore to add to show what expansion pack an ability is from (only will be displayed if it isn't from McRPG)
    # The following placeholders are supported: <expansion-pack>
    expansion-pack:
      - '<gray>Expansion Pack: <gold><expansion-pack>'
  ability-specific-localization:
    # Configure localization for the Bleed ability
    bleed:
      display-item:
        # Allows you to configure how this ability's name will be displayed
        name: "<red><ability></red>"
        # The name of this ability to be displayed across McRPG
        ability-name: "Bleed"
        material: REDSTONE
        # Supports the following placeholders: <skill>, <activation-chance>
        lore:
          - '<gray>Inflicts the <red>Bleed</red> status on an enemy when attacking'
          - '<gray>with sword, dealing damage over time.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Activation Chance: <gold><activation-chance>'
    # Configure localization for the Deeper Wound ability
    deeper-wound:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Deeper Wound"
        material: RED_DYE
        # Supports the following placeholders: <skill>, <activation-chance>, <additional-bleed-cycles>, <tier>
        lore:
          - '<gray>Enhances Bleed ability to last longer.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Activation Chance: <gold><activation-chance>'
          - '<gray>Additional Bleed Cycles: <gold><additional-bleed-cycles>'
    # Configure localization for the Enhanced Bleed ability
    enhanced-bleed:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Enhanced Bleed"
        material: SPIDER_EYE
        lore:
          - '<gray>Enhances Bleed ability to do more damage each tick, with a chance to deal bonus damage.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Base Damage Boost: <gold><base-damage-boost>'
          - '<gray>Bonus Damage Chance: <gold><bonus-damage-chance>'
          - '<gray>Bonus Damage: <gold><bonus-damage>'
    rage-spike:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Rage Spike"
        material: IRON_SWORD
        lore:
          - '<gray>Ready your sword, then crouch to blast forward, damaging and knocking back foes.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Damage: <gold><damage>'
          - '<gray>Cooldown: <gold><cooldown>'
    serrated-strikes:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Serrated Strikes"
        material: STONE_SWORD
        lore:
          - '<gray>Ready your sword and attack an enemy to increase Bleed activation chance.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Duration: <gold><ability-duration>'
          - '<gray>Activation Chance Increase: <gold><activation-chance-increase>'
          - '<gray>Cooldown: <gold><cooldown>'
    vampire:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Vampire"
        material: GHAST_TEAR
        lore:
          - '<gray>Enhances Bleed to have a chance to heal you each time Bleed causes damage.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Activation Chance: <gold><activation-chance>'
          - '<gray>Healing Amount: <gold><healing-amount>'
    extra-ore:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Extra Ore"
        material: DIAMOND
        amount: 2
        lore:
          - '<gray>Will occasionally double drops while mining.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Activation Chance: <gold><activation-chance>'
    its-a-triple:
      display-item:
        name: "<red><ability></red>"
        ability-name: "It's A Triple"
        material: DIAMOND
        amount: 3
        lore:
          - '<gray>Has a chance to change doubled drops from Extra Ore to triple drops'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Activation Chance: <gold><activation-chance>'
    ore-scanner:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Ore Scanner"
        material: DIAMOND_ORE
        lore:
          - '<gray>Activate to see all nearby ores!'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Range: <gold><range>'
          - '<gray>Cooldown: <gold><cooldown>'
    remote-transfer:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Remote Transfer"
        material: CHEST
        lore:
          - '<gray>Allows for linking of a chest to teleport mined blocks into.'
