          - '<gray>Cooldown: <gold><cooldown>'
    mass-harvest:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Mass Harvest"
        material: IRON_HOE
        lore:
          - '<gray>Sends out a fierce pulse that harvests all crops'
          - '<gray>and replants them as it goes.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Pulse Radius: <gold><radius>'
          - '<gray>Cooldown: <gold><cooldown>'
    too-many-plants:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Too Many Plants"
        material: CARROT
        amount: 2
        lore:
