          - '<gray>Minimum Hunger: <gold><minimum-hunger>'
    heavy-swing:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Heavy Swing"
        material: NETHERITE_AXE
        lore:
          - '<gray>Will occasionally break wood in an AOE as you mine..'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Activation Chance: <gold><activation-chance>'
          - '<gray>Radius: <gold><radius>'
    verdant-surge:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Verdant Surge"
