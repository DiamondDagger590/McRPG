    dryads-gift:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Dryad's Gift"
        material: EXPERIENCE_BOTTLE
        lore:
          - '<gray>Has a chance to drop experience when breaking wood'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Activation Chance: <gold><activation-chance>'
          - '<gray>Experience Dropped: <gold><experience-dropped>'
    extra-lumber:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Extra Lumber"
        material: OAK_LOG
        amount: 2
        lore:
          - '<gray>Will occasionally double drops while cutting wood.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Activation Chance: <gold><activation-chance>'
    nymphs-vitality:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Nymph's Vitality"
        material: OAK_SAPLING
        lore:
          - '<gray>Will prevent your hunger from dropping past a certain point when in wooded biomes.'
          - ''
          - '<gray>Skill: <gold><skill>'
