#######################################
#
# English localization for McRPG commands.
# This file is part of the English (en) locale.
#
#######################################
locale: en
config-version: 1
# Configure messages for McRPG commands
commands:
  # The name of console to use if the sender of a command is ever console and the <sender> placeholder is used
  console-name: "console"
  # The message to send when a non-player tries to use a player-only command
  non-player-error: "<red>Non-players are not allowed to run this command."
  # Configure command descriptions shown in help text
  descriptions:
    redeem: "<gray>The subcommand that allows players to redeem things."
    redeem-skill: "<gray>The skill to redeem experience in."
    redeem-experience-amount: "<gray>How much experience to redeem?"
    redeem-levels-amount: "<gray>How many levels to redeem?"
    give: "<gray>The subcommand for all commands that give targets something."
    give-player: "<gray>The player to give something to."
    give-experience-skill: "<gray>The skill to give experience for."
    give-experience-amount: "<gray>The amount of experience to give."
    give-levels-skill: "<gray>The skill to give levels for."
    give-levels-amount: "<gray>The amount of levels to give."
    give-levels-reset-experience-flag: "<gray>If the player's current experience should be reset to 0 after levels are given."
    reset: "<gray>The subcommand for all commands that resets a target."
    reset-player: "<gray>The player to reset something for."
    reset-skill: "<gray>The skill to reset."
    loadout-slot: "<gray>The loadout to set."
    loadout-edit-slot: "<gray>The loadout to edit."
    debug-player: "<gray>The player to debug."
    exp-bank-player: "<gray>The player to modify."
    exp-bank-amount: "<gray>The amount to modify."
    exp-bank-rested-amount: "<gray>The amount of rested experience."
    exp-bank-boosted-amount: "<gray>The amount of boosted experience."
    exp-bank-redeemable-experience-amount: "<gray>The amount of redeemable experience."
    exp-bank-redeemable-levels-amount: "<gray>The amount of redeemable levels."
    exp-bank-reset-player: "<gray>The player to reset."
    exp-bank-give-player: "<gray>The player to give something to."
    exp-bank-remove-player: "<gray>The player to remove something from."
  # Configure messages to surrounding /mcrpg confirm
  # This command will be used to confirm important commands such as resetting a player
  confirmation:
    # The message to send if the player doesn't have any pending confirmations and they run the
    # confirm command.
    no-pending-confirmations: "<gray>You do not have any pending commands to confirm."
    # The message to send to players when they run a command that they need to confirm.
    confirmation-required: "<gray>Please run <click:run_command:/mcrpg confirm><hover:show_text:'<gray>Click this to run <gold>/mcrpg confirm</gold></gray>'><gold><underlined>/mcrpg confirm</gold></click> to run confirm you want to run this command."
  # Configure /mcrpg give commmands
  give:
    # Configure the experience give command
    # Supports the following placeholders: <experience>, <skill>, <target>, <sender>
    experience:
      # The message to send to the player getting experience.
      recipient-message: "<gray>You have been given <gold><experience></gold> in <gold><skill></gold>."
      # The message to send to the sender when the command works.
      sender-success-message: "<gray>You gave <gold><experience></gold> in <gold><skill></gold> to <gold><target></gold>."
      # The message to send to the sender when the command fails.
      sender-error-message: "<red>Unable to give <gray><player></gray> experience at the moment."
    # Configure the level give command
    # Supports the following placeholders: <level>, <skill>, <target>, <sender>
    level:
      # The message to send to the player getting levels.
      recipient-message: "<gray>You have been given <gold><level> level(s)</gold> in <gold><skill></gold>."
      # The message to send to the sender when the command works.
      sender-success-message: "<gray>You gave <gold><level> level(s)</gold> in <gold><skill></gold> to <gold><target></gold>."
      # The message to send to the sender when the command fails.
      sender-error-message: "<red>Unable to give <gray><player></gray> levels at the moment."
  # Configure the link command for Remote Transfer
  # Supports the following placeholders: <skill> (the localized name of Remote Transfer)
  link:
    # The message to be sent if the command is run while the player isn't looking at a chest
    not-looking-at-chest-message: '<red>You must be looking at a chest in order to link <skill>.'
    # The message to be sent if the command is run and the Remote Transfer ability is disabled
    remote-transfer-not-enabled-message: '<red><skill> is not currently enabled.'
    # The message to be sent if the linking worked successfully.
    link-success-message: '<gray>Successfully linked chest to your <skill> ability.'
  # Configure the unlink command for Remote Transfer
  # Supports the following placeholders: <skill> (the localized name of Remote Transfer)
  unlink:
    # The message to be sent if unlinking worked successfully.
    unlink-success-message: '<gray>You have unlinked your chest.'
    # The message to be sent if the command is run but the player doesn't have a linked chest.
    no-linked-chest-message: "<gray>You don't have a linked chest."
  # Configure the different /mcrpg loadout commands.
  loadout:
    # Configure the loadout edit command.
    edit:
      # The message to be sent to the player who ran the command if they don't have a loadout
      # with the provided slot.
      # Supports the following placeholders: <loadout-slot>
      no-loadout-matches: '<red>You do not have a loadout slot with that slot.'
    # Configure the loadout set command.
    set:
      # The message to be sent to the player who ran the command if they don't have a loadout
      # with the provided slot.
      # Supports the following placeholders: <loadout-slot>
      no-loadout-matches: '<red>You do not have a loadout slot with that slot.'
      # The message to be sent if the loadout was set successfully.
      # Supports the following placeholders: <loadout-slot>
      loadout-set-success-message: "<gray>Your active loadout is now <gold>loadout #<loadout-slot></gold>.</gray>"
  # Configure /mcrpg admin commands
  admin:
    # Configure the reload command
    reload:
      # The message to send to the sender when the command works.
      sender-success-message: "<gray>You have reloaded all McRPG files."
    # Configure the debug command
    # Supports the following placeholders: <target>, <upgrade-points>, <skill>, <level>, <experience>
    debug:
      # The header message printed at the start of debug output.
      header-message: "<gray>Printing debug information for player <gold><target>"
      # The message showing upgrade points.
      upgrade-points-message: "<gray>Upgrade Points: <gold><upgrade-points>"
      # The message showing skill information.
      skill-info-message: "<gray>Skill: <gold><skill> <gray>Level: <gold><level> <gray>Exp: <gold><experience>"
    # Configure /mcrpg quest admin registry commands
    # Lists registered objective types, reward types, scope providers, and quest definitions.
    quest-registry:
      # Supports: <registry_type>, <count>
      header: "<gold><registry_type> <gray>(<count>):"
      # Supports: <registry_key>
      entry: "  <white><registry_key>"
      # Supports: <registry_type>
      empty: "<gray>No <white><registry_type></white> registered."
    # Configure /mcrpg board admin commands
    board-admin:
      # Configure /mcrpg board admin rotate
      rotate:
        # Supports: <refresh_type>
        success: "<green>Board rotation triggered for refresh type: <white><refresh_type></white>."
      # Configure /mcrpg board admin offerings
      offerings:
        list-empty: "<gray>No visible shared offerings on the board."
        # Supports: <count>
        list-header: "<gold>Shared Board Offerings <gray>(<count>):"
        # Supports: <offering_id>, <quest_def>, <rarity>, <category>
        list-entry: "  <white><offering_id></white> | <white><quest_def></white> | <white><rarity></white> | <white><category>"
        # Supports: <offering_id>
        expire-not-found: "<red>Offering not found: <white><offering_id>"
        # Supports: <offering_id>, <offering_state>
        expire-invalid-state: "<red>Offering <white><offering_id></white> cannot be expired (current state: <white><offering_state></white>)."
        # Supports: <offering_id>
        expire-success: "<green>Offering <white><offering_id></white> expired successfully."
        # Supports: <offering_id>
        expire-error: "<red>Error expiring offering <white><offering_id></white>. Check console."
      # Configure /mcrpg board admin scoped
      scoped:
        # Supports: <entity_id>
        list-empty: "<gray>No scoped board state found for entity: <white><entity_id>"
        # Supports: <entity_id>, <count>
        list-header: "<gold>Scoped Board State for '<white><entity_id></white>' <gray>(<count>):"
        # Supports: <offering_id>, <offering_state>, <accepted_by>
        list-entry: "  <white><offering_id></white> | state=<white><offering_state></white> | accepted_by=<white><accepted_by>"
        # Supports: <entity_id>, <cancelled_count>
        reset-success: "<green>Reset scoped board state for '<white><entity_id></white>'. Cancelled <white><cancelled_count></white> quest(s)."
        # Supports: <entity_id>
        reset-error: "<red>Error resetting scoped state for <white><entity_id></white>. Check console."
        # Supports: <entity_id>
        generate-success: "<green>Generating scoped offerings for entity '<white><entity_id></white>'."
      # Configure /mcrpg board admin player
      player:
        # Supports: <target>
        offerings-header: "<gold>Offerings visible to <white><target></white>:"
        # Supports: <count>
        offerings-scoped-count: "<gray>Scoped offerings: <white><count>"
        # Supports: <entity_id>, <offering_id>, <quest_def>, <rarity>
        offerings-entry: "  <gray>[<white><entity_id></white>] <white><offering_id></white> | <white><quest_def></white> | <white><rarity>"
        # Supports: <target>
        accepted-empty: "<gray><target> has no active board quests."
        # Supports: <target>, <count>
        accepted-header: "<gold>Active Board Quests for <white><target></white> <gray>(<count>):"
        # Supports: <quest_uuid>, <quest_key>, <quest_state>, <rarity>
        accepted-entry: "  <white><quest_uuid></white> | <white><quest_key></white> | state=<white><quest_state></white> | rarity=<white><rarity>"
        # Supports: <offering_id>
        abandon-not-found: "<red>Offering not found: <white><offering_id>"
        # Supports: <offering_id>, <offering_state>
        abandon-invalid-state: "<red>Offering <white><offering_id></white> is not in ACCEPTED state (current: <white><offering_state></white>)."
        # Supports: <offering_id>
        abandon-success: "<green>Offering <white><offering_id></white> abandoned successfully."
        # Supports: <offering_id>
        abandon-error: "<red>Error abandoning offering <white><offering_id></white>. Check console."
      # Configure /mcrpg board admin cooldown
      cooldown:
        # Supports: <scope_type_id>, <scope_id>
        list-empty: "<gray>No active cooldowns for <white><scope_type_id></white>:<white><scope_id>"
        # Supports: <scope_type_id>, <scope_id>, <count>
        list-header: "<gold>Cooldowns for <white><scope_type_id></white>:<white><scope_id></white> <gray>(<count>):"
        # Supports: <cooldown_type>, <category>, <quest_def>, <expires>
        list-entry: "  <white>type=<cooldown_type></white> | cat=<white><category></white> | quest=<white><quest_def></white> | expires=<white><expires>"
        # Supports: <deleted_count>, <scope_type_id>, <scope_id>
        reset-success: "<green>Cleared <white><deleted_count></white> cooldown(s) for <white><scope_type_id></white>:<white><scope_id></white>."
        # Supports: <scope_type_id>, <scope_id>
        reset-error: "<red>Error resetting cooldowns for <white><scope_type_id></white>:<white><scope_id></white>. Check console."
      # Configure /mcrpg board admin rewards
      rewards:
        # Supports: <target>
        pending-empty: "<gray>No pending rewards for <white><target></white>."
        # Supports: <target>, <count>
        pending-header: "<gold>Pending Rewards for <white><target></white> <gray>(<count>):"
        # Supports: <reward_type>, <quest_key>, <expires>
        pending-entry: "  <white><reward_type></white> | quest=<white><quest_key></white> | expires=<white><expires>"
        # Supports: <deleted_count>, <target>
        clear-success: "<green>Cleared <white><deleted_count></white> pending reward(s) for <white><target></white>."
        # Supports: <target>
        clear-error: "<red>Error clearing pending rewards for <white><target></white>. Check console."
      # Configure /mcrpg board admin purge
      purge:
        # Supports: <deleted_count>
        success: "<green>Purge complete. Pruned <white><deleted_count></white> expired cooldown(s)."
        error: "<red>Error during purge. Check console."
    # Configure the reset commands
    reset:
      # Supports the following placeholders: <target>, <sender>
      player:
        # The message to send to the player being reset.
        recipient-message: "<gray>You have had your McRPG data reset."
        # The message to send to the sender when the command works.
        sender-success-message: "<gray>You have reset <gold><target>'s <gray>McRPG data."
        # The message to send to the sender when the command fails to save updated data.
        sender-error-saving-message: "<red>There was an error trying to save data for <target> after resetting their data. Please have an admin check console."
        # The message to send to the sender when the command fails.
        sender-error-message: "<red>Unable to reset McRPG data for <target>."
      # Supports the following placeholders: <skill>, <target>, <sender>
      skill:
        # The message to send to the player being reset.
        recipient-message: "<gray>You have had your <gold><skill> skill <gray>reset."
        # The message to send to the sender when the command works.
        sender-success-message: "<gray>You have reset <gold><target>'s <skill> skill<gray>."
        # The message to send to the sender when the command fails to save updated data.
        sender-error-saving-message: "<red>There was an error trying to save data for <target> after resetting their data. Please have an admin check console."
        # The message to send to the sender when the command fails.
        sender-error-message: "<red>Unable to reset McRPG data for <target>."
    # Configure admin commands for modifying the experience bank of a player
    exp-bank:
      # Configure redeemable modify commands
      redeemable:
        experience:
          # Configure the give redeemable experience command
          # Supports the following placeholders: <redeemable-experience>, <target>, <sender>
          give:
            # The message to send to the player getting redeemable experience.
            recipient-message: "<gray>You have been given <gold><redeemable-experience></gold> redeemable experience."
            # The message to send to the sender when the command works.
            sender-success-message: "<gray>You gave <gold><redeemable-experience></gold> redeemable experience to <gold><target></gold>."
            # The message to send to the sender when the command fails.
            sender-error-message: "<red>Unable to give <gray><player></gray> redeemable experience at the moment."
          # Configure the remove redeemable experience command
          # Supports the following placeholders: <redeemable-experience>, <target>, <sender>
          remove:
            # The message to send to the player losing redeemable experience.
            recipient-message: "<gray>You have lost <gold><redeemable-experience></gold> redeemable experience."
            # The message to send to the sender when the command works.
            sender-success-message: "<gray>You removed <gold><redeemable-experience></gold> redeemable experience from <gold><target></gold>."
            # The message to send to the sender when the command fails.
            sender-error-message: "<red>Unable to remove <gray><player></gray>'s redeemable experience at the moment."
          # Configure the reset redeemable experience command
          # Supports the following placeholders: <target>, <sender>
          reset:
            # The message to send to the player having their redeemable experience reset.
            recipient-message: "<gray>You have had your redeemable experience reset."
            # The message to send to the sender when the command works.
            sender-success-message: "<gray>You reset <gold><target></gold>'s redeemable experience."
            # The message to send to the sender when the command fails.
            sender-error-message: "<red>Unable to reset <gray><player></gray>'s redeemable experience at the moment."
        levels:
          # Configure the give redeemable levels command
          # Supports the following placeholders: <redeemable-levels>, <target>, <sender>
          give:
            # The message to send to the player getting redeemable levels.
            recipient-message: "<gray>You have been given <gold><redeemable-levels></gold> redeemable levels."
            # The message to send to the sender when the command works.
            sender-success-message: "<gray>You gave <gold><redeemable-levels></gold> redeemable levels to <gold><target></gold>."
            # The message to send to the sender when the command fails.
            sender-error-message: "<red>Unable to give <gray><player></gray> redeemable levels at the moment."
          # Configure the remove redeemable levels command
          # Supports the following placeholders: <redeemable-levels>, <target>, <sender>
          remove:
            # The message to send to the player losing redeemable levels.
            recipient-message: "<gray>You have had your redeemable levels reset."
            # The message to send to the sender when the command works.
            sender-success-message: "<gray>You reset <gold><target></gold>'s redeemable levels."
            # The message to send to the sender when the command fails.
            sender-error-message: "<red>Unable to give <gray><player></gray> redeemable levels at the moment."
          # Configure the give redeemable levels command
          # Supports the following placeholders: <target>, <sender>
          reset:
            # The message to send to the player having their redeemable levels reset.
            recipient-message: "<gray>You have been given <gold><redeemable-levels></gold> redeemable levels."
            # The message to send to the sender when the command works.
            sender-success-message: "<gray>You reset <gold><target></gold>'s redeemable levels."
            # The message to send to the sender when the command fails.
            sender-error-message: "<red>Unable to reset <gray><player></gray>'s redeemable levels at the moment."
      # Configure rested experience modify commands.
      rested-experience:
        # Configure the give rested experience command
        # Supports the following placeholders: <rested-experience>, <target>, <sender>
        give:
          # The message to send to the player getting rested experience.
          recipient-message: "<gray>You have been given <gold><rested-experience></gold> rested experience."
          # The message to send to the sender when the command works.
          sender-success-message: "<gray>You gave <gold><rested-experience></gold> rested experience to <gold><target></gold>."
          # The message to send to the sender when the command fails.
          sender-error-message: "<red>Unable to give <gray><player></gray> rested experience at the moment."
        # Configure the remove rested experience command
        # Supports the following placeholders: <rested-experience>, <target>, <sender>
        remove:
          # The message to send to the player losing rested experience.
          recipient-message: "<gray>You have lost <gold><rested-experience></gold> rested experience."
          # The message to send to the sender when the command works.
          sender-success-message: "<gray>You removed <gold><rested-experience></gold> rested experience from <gold><target></gold>."
          # The message to send to the sender when the command fails.
          sender-error-message: "<red>Unable to remove <gray><player></gray>'s rested experience at the moment."
        # Configure the reset rested experience command
        # Supports the following placeholders: <target>, <sender>
        reset:
          # The message to send to the player having their rested experience reset.
          recipient-message: "<gray>You have had your rested experience reset."
          # The message to send to the sender when the command works.
          sender-success-message: "<gray>You reset <gold><target></gold>'s rested experience."
          # The message to send to the sender when the command fails.
          sender-error-message: "<red>Unable to reset <gray><player></gray>'s rested experience at the moment."
      # Configure boosted experience modify commands.
      boosted-experience:
        # Configure the give boosted experience command
        # Supports the following placeholders: <boosted-experience>, <target>, <sender>
        give:
          # The message to send to the player getting boosted experience.
          recipient-message: "<gray>You have been given <gold><boosted-experience></gold> boosted experience."
          # The message to send to the sender when the command works.
          sender-success-message: "<gray>You gave <gold><boosted-experience></gold> boosted experience to <gold><target></gold>."
          # The message to send to the sender when the command fails.
          sender-error-message: "<red>Unable to give <gray><player></gray> boosted experience at the moment."
        # Configure the remove rested experience command
        # Supports the following placeholders: <boosted-experience>, <target>, <sender>
        remove:
          # The message to send to the player losing boosted experience.
          recipient-message: "<gray>You have lost <gold><boosted-experience></gold> boosted experience."
          # The message to send to the sender when the command works.
          sender-success-message: "<gray>You removed <gold><boosted-experience></gold> boosted experience from <gold><target></gold>."
          # The message to send to the sender when the command fails.
          sender-error-message: "<red>Unable to remove <gray><player></gray>'s boosted experience at the moment."
        # Configure the reset boosted experience command
        # Supports the following placeholders: <target>, <sender>
        reset:
          # The message to send to the player having their boosted experience reset.
          recipient-message: "<gray>You have had your boosted experience reset."
          # The message to send to the sender when the command works.
          sender-success-message: "<gray>You reset <gold><target></gold>'s boosted experience."
          # The message to send to the sender when the command fails.
          sender-error-message: "<red>Unable to reset <gray><player></gray>'s boosted experience at the moment."
  # Configure /mcrpg quest commands
  quest:
    # Messages shared across multiple quest commands
    common:
      # Supports: <quest_uuid>
      invalid-uuid: "<red>Invalid UUID: <white><quest_uuid>"
      specify-player-from-console: "<red>You must specify a player when running from console."
      # Supports: <quest_uuid>
      quest-not-found: "<red>No active quest found with UUID: <white><quest_uuid>"
    # Configure /mcrpg quest list
    list:
      no-permission-others: "<red>You don't have permission to view other players' quests."
      # Supports: <target>
      no-active-quests: "<gray>No active quests for <white><target></white>."
      # Supports: <target>, <count>
      header: "<gold>Active quests for <white><target></white> <gray>(<count>):"
      # Supports: <quest_key>, <quest_state>, <stages_completed>, <stages_total>, <quest_uuid>
      entry: "  <white><quest_key></white> <gray>- <quest_state> <dark_gray>[<stages_completed>/<stages_total> stages] <dark_gray>(UUID: <quest_uuid>...)"
    # Configure /mcrpg quest info
    info:
      title: "<gold><bold>Quest Info</bold></gold>"
      # Supports: <quest_key>
      definition: "  <gray>Definition: <white><quest_key>"
      # Supports: <quest_uuid>
      uuid: "  <gray>UUID: <white><quest_uuid>"
      # Supports: <quest_state>
      state: "  <gray>State: <white><quest_state>"
      # Supports: <scope_type>
      scope-type: "  <gray>Scope Type: <white><scope_type>"
      # Supports: <timestamp>
      started: "  <gray>Started: <white><timestamp>"
      # Supports: <timestamp>
      ended: "  <gray>Ended: <white><timestamp>"
      # Supports: <timestamp>
      expires: "  <gray>Expires: <white><timestamp>"
      # Supports: <count>
      stages-header: "  <gold>Stages <gray>(<count>):"
      # Supports: <state_color>, <stage_state>, <stage_key>, <phase_index>
      stage-entry: "    <state_color>[<stage_state>] <white><stage_key></white> <dark_gray>(phase <phase_index>)"
      # Supports: <state_color>, <objective_key>, <current_progress>, <required_progress>
      objective-entry: "      <state_color>● <white><objective_key></white> <gray>(<gold><current_progress></gold>/<gold><required_progress></gold>)"
    # Configure /mcrpg quest start
    start:
      no-permission-others: "<red>You don't have permission to start quests for other players."
      # Supports: <target>, <quest_key>
      cannot-start: "<red>Player <white><target></white> cannot start quest <white><quest_key></white> (already active or repeat-mode restriction)."
      # Supports: <quest_key>, <target>, <quest_uuid>
      success: "<green>Started quest <white><quest_key></white> for <white><target></white>. <gray>(UUID: <quest_uuid>)"
      # Supports: <scope_type>
      no-scope-provider: "<red>Failed to start quest: no scope provider for type <white><scope_type></white>"
      error: "<red>An error occurred while validating quest start. Check console."
    # Configure /mcrpg quest cancel
    cancel:
      # Supports: <quest_state>
      not-cancellable: "<red>Quest is not in a cancellable state: <white><quest_state>"
      # Supports: <quest_key>, <quest_uuid>
      success: "<green>Cancelled quest <white><quest_key></white> <gray>(UUID: <quest_uuid>)"
    # Configure /mcrpg quest admin commands
    admin:
      # Configure /mcrpg quest admin reload
      reload:
        # Supports: <after_count>, <before_count>
        success: "<green>Quest definitions reloaded. <gray>(<after_count> definitions loaded, was <before_count>)"
      # Configure /mcrpg quest admin complete
      complete:
        # Supports: <quest_state>
        not-in-progress: "<red>Quest is not in progress: <white><quest_state>"
        # Supports: <quest_key>, <quest_uuid>
        success: "<green>Force-completed quest <white><quest_key></white> <gray>(UUID: <quest_uuid>)"
        # Supports: <quest_key>
        definition-not-found: "<red>Quest definition not found for key: <white><quest_key></white>. Cannot complete without definition."
      # Configure /mcrpg quest admin setprogress
      setprogress:
        # Supports: <objective_key>
        invalid-objective-key: "<red>Invalid objective key: <white><objective_key>"
        # Supports: <objective_key>, <quest_uuid>
        objective-not-found: "<red>No objective found with key <white><objective_key></white> in quest <white><quest_uuid>"
        # Supports: <objective_key>, <current_progress>, <required_progress>, <quest_key>
        success: "<green>Set progress of <white><objective_key></white> to <gold><current_progress></gold>/<gold><required_progress></gold> in quest <white><quest_key></white>."
  # Configure commands to redeem things such as experience or levels.
  redeem:
    # Configure the redeemable levels command.
    levels:
      # The message to send to the player if they are trying to redeem an amount of levels more than
      # the amount they have.
      not-enough-levels: "<red>You do not have enough levels to redeem the requested amount."
      # The message to send to the player if they are trying to redeem levels into a skill that is already maxed.
      # Supports the following placeholders: <skill>
      skill-already-maxed: "<red>You can not redeem levels into <gold><skill></gold> as that skill is already max level."
      # The message to send players if they successfully redeem levels.
      # Supports the following placeholders: <redeemed-levels>, <skill>
      redeemed-levels: "<gray>You have redeemed <gold><redeemed-levels> levels</gold> into <gold><skill></gold>."
    # Configure the redeemable experience command.
    experience:
      # The message to send to the player if they are trying to redeem an amount of experience more than
      # the amount they have.
      not-enough-experience: "<red>You do not have enough experience to redeem the requested amount."
      # The message to send to the player if they are trying to redeem experience into a skill that is already maxed.
      # Supports the following placeholders: <skill>
      skill-already-maxed: "<red>You can not redeem experience into <gold><skill></gold> as that skill is already max level."
      # The message to send players if they successfully redeem experience.
      # Supports the following placeholders: <redeemed-experience>, <skill>
      redeemed-experience: "<gray>You have redeemed <gold><redeemed-experience> experience</gold> into <gold><skill></gold>."
