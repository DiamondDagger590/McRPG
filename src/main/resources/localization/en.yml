#######################################
#
# Configure localization for players.

# Certain messages will contain placeholders using the
# <> format. This format is for any native placeholders supported
# by McRPG.
#
# If PAPI is enabled, then you may also use PAPI placeholders
# for messages in this file as well.
#
#######################################
#
config-version: 1
# Configure messages for McRPG commands
commands:
  # The name of console to use if the sender of a command is ever console and the <sender> placeholder is used
  console-name: "console"
  # Configure messages to surrounding /mcrpg confirm
  # This command will be used to confirm important commands such as resetting a player
  confirmation:
    # The message to send if the player doesn't have any pending confirmations and they run the
    # confirm command.
    no-pending-confirmations: "<gray>You do not have any pending commands to confirm."
    # The message to send to players when they run a command that they need to confirm.
    confirmation-required: "<gray>Please run <click:run_command:/mcrpg confirm><hover:show_text:'<gray>Click this to run <gold>/mcrpg confirm</gold></gray>'><gold><underlined>/mcrpg confirm</gold></click> to run confirm you want to run this command."
  # Configure /mcrpg give commmands
  give:
    # Configure the experience give command
    # Supports the following placeholders: <experience>, <skill>, <target>, <sender>
    experience:
      # The message to send to the player getting experience.
      recipient-message: "<gray>You have been given <gold><experience></gold> in <gold><skill></gold>."
      # The message to send to the sender when the command works.
      sender-success-message: "<gray>You gave <gold><experience></gold> in <gold><skill></gold> to <target>."
      # The message to send to the sender when the command fails.
      sender-error-message: "<red>Unable to give <gray><player></gray> experience at the moment."
    # Configure the level give command
    # Supports the following placeholders: <level>, <skill>, <target>, <sender>
    level:
      # The message to send to the player getting levels.
      recipient-message: "<gray>You have been given <gold><experience> experience</gold> in <gold><skill></gold>."
      # The message to send to the sender when the command works.
      sender-success-message: "<gray>You gave <gold><level> level(s)</gold> in <gold><skill></gold> to <target>."
      # The message to send to the sender when the command fails.
      sender-error-message: "<red>Unable to give <gray><player></gray> levels at the moment."
  # Configure the link command for Remote Transfer
  # Supports the following placeholders: <skill> (the localized name of Remote Transfer)
  link:
    # The message to be sent if the command is run while the player isn't looking at a chest
    not-looking-at-chest-message: '<red>You must be looking at a chest in order to link <skill>.'
    # The message to be sent if the command is run and the Remote Transfer ability is disabled
    remote-transfer-not-enabled-message: '<red><skill> is not currently enabled.'
    # The message to be sent if the linking worked successfully.
    link-success-message: '<gray>Successfully linked chest to your <skill> ability.'
  # Configure the unlink command for Remote Transfer
  # Supports the following placeholders: <skill> (the localized name of Remote Transfer)
  unlink:
    # The message to be sent if unlinking worked successfully.
    unlink-success-message: '<gray>You have unlinked your chest.'
    # The message to be sent if the command is run but the player doesn't have a linked chest.
    no-linked-chest-message: "<gray>You don't have a linked chest."
  # Configure the different /mcrpg loadout commands.
  loadout:
    # Configure the loadout edit command.
    edit:
      # The message to be sent to the player who ran the command if they don't have a loadout
      # with the provided slot.
      # Supports the following placeholders: <loadout-slot>
      no-loadout-matches: '<red>You do not have a loadout slot with that slot.'
    # Configure the loadout set command.
    set:
      # The message to be sent to the player who ran the command if they don't have a loadout
      # with the provided slot.
      # Supports the following placeholders: <loadout-slot>
      no-loadout-matches: '<red>You do not have a loadout slot with that slot.'
      # The message to be sent if the loadout was set successfully.
      # Supports the following placeholders: <loadout-slot>
      loadout-set-success-message: "<gray>Your active loadout is now <gold>loadout #<loadout-slot></gold>.</gray>"
  # Configure /mcrpg admin commands
  admin:
    # Configure the reload command
    reload:
      # The message to send to the sender when the command works.
      sender-success-message: "<gray>You have reloaded all McRPG files."
    reset:
      # Supports the following placeholders: <target>, <sender>
      player:
        # The message to send to the player being reset.
        recipient-message: "<gray>You have had your McRPG data reset."
        # The message to send to the sender when the command works.
        sender-success-message: "<gray>You have reset <gold><target>'s <gray>McRPG data."
        # The message to send to the sender when the command fails to save updated data.
        sender-error-saving-message: "<red>There was an error trying to save data for <target> after resetting their data. Please have an admin check console."
        # The message to send to the sender when the command fails.
        sender-error-message: "<red>Unable to reset McRPG data for <target>."
      # Supports the following placeholders: <skill>, <target>, <sender>
      skill:
        # The message to send to the player being reset.
        recipient-message: "<gray>You have had your <gold><skill> skill <gray>reset."
        # The message to send to the sender when the command works.
        sender-success-message: "<gray>You have reset <gold><target>'s <skill> skill<gray>."
        # The message to send to the sender when the command fails to save updated data.
        sender-error-saving-message: "<red>There was an error trying to save data for <target> after resetting their data. Please have an admin check console."
        # The message to send to the sender when the command fails.
        sender-error-message: "<red>Unable to reset McRPG data for <target>."
  # Configure commands to redeem things such as experience or levels.
  redeem:
    # Configure the redeemable levels command.
    levels:
      # The message to send to the player if they are trying to redeem an amount of levels more than
      # the amount they have.
      not-enough-levels: "<red>You do not have enough levels to redeem the requested amount."
      # The message to send to the player if they are trying to redeem levels into a skill that is already maxed.
      # Supports the following placeholders: <skill>
      skill-already-maxed: "<red>You can not redeem levels into <gold><skill></gold> as that skill is already max level."
      # The message to send players if they successfully redeem levels.
      # Supports the following placeholders: <redeemed-levels>, <skill>
      redeemed-levels: "<gray>You have redeemed <gold><redeemed-levels> levels</gold> into <gold><skill></gold>."
# Configure McRPG expansions
expansion:
  # What is the display name for the McRPG content expansion?
  mcrpg: 'McRPG'
# Configure messages for player login
login:
  # The message to send a player whenever there is an issue loading their McRPG data.
  unable-to-load-data: "<red>There was an issue loading your McRPG data, logging back into the server may fix this issue. If that does not fix the issue, please contact a server admin!"
# Configure messages and localization related to experience things
experience:
  # Configure messages related to the rested experience feature
  rested-experience:
    # The message to send to a player whenever they reach the maximum amount of rested experience they can accumulate.
    maximum-rested-experience-reached: '<gray>You currently have reached your limit of how much rested experience. Gain experience with McRPG to use it to level up faster!'
    # The message to send via action bar to a player whenever they enter an area that's registered as an McRPG safe zone and online accumulation is allowed.
    entering-safe-zone-online-accumulation: '<gray>You have entered a rest zone, you will now begin gaining rested experience.'
    # The message to send via action bar to a player whenever they leave an area that's registered as an McRPG safe zone and online accumulation is allowed.
    leaving-safe-zone-online-accumulation: '<gray>You have left a rest zone, you will no longer be gaining rested experience.'
    # The message to send via action bar to a player whenever they enter an area that's registered as an McRPG safe zone and offline accumulation is allowed.
    entering-safe-zone-offline-accumulation: '<gray>You have entered a rest zone, you will now begin gaining rested experience.'
    # The message to send via action bar to a player whenever they leave an area that's registered as an McRPG safe zone and offline accumulation is allowed.
    leaving-safe-zone-offline-accumulation: '<gray>You have left a rest zone, you will no longer be gaining rested experience.'
    # The message to send to a player whenever they log in and have gained rested experience whilst they were offline.
    offline-rested-experience-awarded: '<gray>You have gained <gold><rested-experience-gained> levels</gold> worth of rested experience while offline. Gain experience with McRPG to use it to level up faster!'
  # Configure experience display localization
  experience-display:
    # The message to send to a player's action bar whenever they gain experience.
    # Valid placeholders are <skill>, <level>, <current-experience>, <required-experience-to-level-up> and <remaining-experience-to-level-up>
    action-bar-display-message: "<gray><skill> Lv. <gold><level></gold> - Remaining Exp <gold><remaining-experience-to-level-up></gold>"
    # The message to send to display as the boss bar's name when sent to a player.
    # Valid placeholders are <skill>, <level>, <current-experience>, <required-experience-to-level-up> and <remaining-experience-to-level-up>
    boss-bar-display-message: "<gray><skill> Lv. <gold><level></gold> - Remaining Exp <gold><remaining-experience-to-level-up></gold>"
gui:
  # Allows for configuring slots that are shared commonly across many guis.
  common:
    next-page-button:
      display-item:
        name: "<gold>Next Page</gold>"
        material: ARROW
        lore:
          - '<gray>Click this to go to the next page.'
    previous-page-button:
      display-item:
        name: "<gold>Previous Page</gold>"
        material: ARROW
        lore:
          - '<gray>Click this to go to the previous page.'
    # Configure the back button
    previous-gui-button:
      display-item:
        name: "<red>Return to Editing</red>"
        material: BARRIER
        # Supports the following placeholders: <ability>
        lore:
          - '<gray>Click to return to editing <gold><ability></gold>'
    # Configure the item to be used as a filler for the gui
    filler-item:
      display-item:
        name: ""
        material: GRAY_STAINED_GLASS_PANE
  # The GUI serves as the "main" McRPG gui and is the main access point
  # for most players into McRPG content.
  home-gui:
    title: "<gold>Home Gui"
    # The slot that takes players to the settings gui
    settings-slot:
      display-item:
        material: PLAYER_HEAD
        name: '<red>Settings'
        lore:
          - '<gray>Click to edit your McRPG settings.'
    # The slot that takes players to the ability gui
    abilities-slot:
      display-item:
        material: DIAMOND_ORE
        name: "<red>Abilities"
        lore:
          - '<gray>Click to view your abilities.'
    # The slot that takes players to the skills gui
    skills-slot:
      display-item:
        material: DIAMOND_SWORD
        name: "<red>Skills"
        lore:
          - '<gray>Click to view your skills.'
    # The slot that takes players to the loadout gui.
    loadouts-slot:
      display-item:
        material: COMPASS
        name: "<red>Loadouts"
        lore:
          - '<gray>Click to edit your loadouts.'
    # The slot that takes players to the experience bank gui.
    experience-bank-slot:
      display-item:
        material: EXPERIENCE_BOTTLE
        name: "<red>Experience Bank"
        # Supported placeholders: <redeemable-experience>, <redeemable-levels>,
        # <rested-experience> and <boosted-experience>
        lore:
          - '<gray>Click to view banked experience and redeem'
          - '<gray>redeemable experience.'
          - ''
          - '<gray>Redeemable Experience: <gold><redeemable-experience>'
          - '<gray>Redeemable Levels: <gold><redeemable-levels>'
          - '<gray>Rested Experience: <gold><rested-experience>'
          - '<gray>Boosted Experience: <gold><boosted-experience>'
  # This GUI allows players to view and edit their abilities.
  ability-gui:
    title: '<gold>Viewing Abilities'
  # Some GUIs (such as the ability gui) have different ability sort options that are provided.
  # This allows for configuring those options.
  ability-sort-types:
    alphabetical:
      display-item:
        name: "<red>Alphabetical Sort"
        material: BAMBOO_HANGING_SIGN
        lore:
          - '<gray>Click to change how abilities are sorted.'
    innate-abilities:
      display-item:
        name: "<red>Innate Abilities Sort"
        material: REDSTONE
        lore:
          - '<gray>Click to change how abilities are sorted.'
    skill:
      display-item:
        name: "<red>Sort by Skill"
        material: DIAMOND_SWORD
        lore:
          - '<gray>Click to change how abilities are sorted.'
    unlocked-abilities:
      display-item:
        name: "<red>Sort by Unlock Level"
        material: DIAMOND
        lore:
          - '<gray>Click to change how abilities are sorted.'
    upgradable-abilities:
      display-item:
        name: "<red>Sort by Abilities you can upgrade"
        material: DIAMOND
        lore:
          - '<gray>Click to change how abilities are sorted.'
    passive-abilities:
      display-item:
        name: "<red>Sort by Passive Abilities"
        material: GHAST_TEAR
        lore:
          - '<gray>Click to change how abilities are sorted.'
    active-abilities:
      display-item:
        name: "<red>Sort by Active Abilities"
        material: STONE_SWORD
        lore:
          - '<gray>Click to change how abilities are sorted.'
  # This GUI allows players to view and edit their skills.
  skill-gui:
    title: '<gold>Viewing Skills'
  # Some GUIs (such as the skills gui) have different skill sort options that are provided.
  # This allows for configuring those options.
  skill-sort-types:
    alphabetical:
      display-item:
        name: "<red>Alphabetical Sort"
        material: BAMBOO_HANGING_SIGN
        lore:
          - '<gray>Click to change how skills are sorted.'
    skill-level:
      display-item:
        name: "<red>Skill Level Sort"
        material: DIAMOND_ORE
        lore:
          - '<gray>Click to change how skills are sorted.'
    experience-to-level:
      display-item:
        name: "<red>Skill Remaining Exp To Level Sort"
        material: EXPERIENCE_BOTTLE
        lore:
          - '<gray>Click to change how skills are sorted.'
  # This GUI allows for editing an ability's attributes. Since these items are shared
  # across multiple GUIs, they are configured under the ability.ability-attribute section.
  ability-edit-gui:
    title: '<gold>Editing <ability>'
    # Allows configuration of displaying different states of a location attribute (such as Remote Transfer)
    location-attribute:
      # What item should be used if there is no location saved for this attribute?
      no-location-saved:
        display-item:
          name: "<gold>Bound Location</gold>"
          material: CHERRY_SIGN
          lore:
            - "<gray>You currently don't have a bound location for this ability."
      # What item should be used if there is a location saved for this attribute?
      location-saved:
        display-item:
          name: "<gold>Bound Location</gold>"
          material: CHERRY_SIGN
          # Supports the following placeholders: <location>, <location-x>, <location-y>, <location-z>, <location-world>
          lore:
            - "<gray>This ability's bound location is:"
            - "<gray>X: <gold><location-x>"
            - "<gray>Y: <gold><location-y>"
            - "<gray>Z: <gold><location-z>"
            - "<gray>World: <gold><location-world>"
    # Allows configuration of the ability's tier.
    # This may have additional lore appended to it based on things like upgrade eligibility, upgrade cost,
    # upgrade quest progress, etc.
    # These additional lores are used elsewhere too, so they will not be configured here. They can be configured
    # in ability.lore
    tier-attribute:
      display-item:
        name: "<gold>Ability Tier Upgrade</gold>"
        material: IRON_INGOT
        # Supports the following placeholders: <tier>
        lore:
          - "<gray>Tier: <gold><tier>"
    toggled-off-attribute:
      toggled-off:
        display-item:
          name: "<gold>Ability Toggle Status</gold>"
          material: REDSTONE_BLOCK
          lore:
            - "<gray>Ability is currently <red>DISABLED</red>.</gray>"
            - "<gray>Click to <green>ENABLE</green> this ability.</gray>"
      toggled-on:
        display-item:
          name: "<gold>Ability Toggle Status</gold>"
          material: EMERALD_BLOCK
          lore:
            - "<gray>Ability is currently <green>ENABLED</green>.</gray>"
            - "<gray>Click to <red>DISABLE</red> this ability.</gray>"
    remote-transfer-block-toggle-attribute:
      display-item:
        material: CHEST
        name: "<gold>Block Filter"
  # This GUI allows for players to view the current state of their loadout
  loadout-gui:
    # The title of the gui.
    # Supported placeholders: <loadout-name>
    title: "<gold>Editing Loadout: <loadout-name>"
    # This slot shows a slot that players
    invalid-slot:
      display-item:
        material: RED_STAINED_GLASS_PANE
        name: " "
    # Configure the slot players click to change an ability that is already in their loadout.
    ability-slot:
      # The item displayed is from the ability's display, but this lore is appended to let players know what to do
      additional-lore:
        - ''
        - '<gray>Click to change what ability is in this slot.'
    # Configure the slot players can click to add an ability to an empty slot in the loadout.
    free-ability-slot:
      display-item:
        material: CYAN_STAINED_GLASS_PANE
        name: '<gold>Empty Loadout Slot'
        lore:
          - ''
          - '<gray>Click to change what ability is in this slot.'
    # Configure the slot players can click to open the menu to edit their loadout displays
    loadout-display-open-slot:
      display-item:
        material: OAK_HANGING_SIGN
        name: '<gold>Edit Loadout Display'
        lore:
          - '<gold>Click <gray>to change how this loadout is displayed.'
    # Configure the slot players can click to go from the loadout gui back to the loadout select gui.
    loadout-home-slot:
      display-item:
        material: BARRIER
        name: '<red>Return to loadout selection</red>'
        lore: '<gray>Click to return to the loadout selection screen.</gray>'
  # This GUI allows for players to choose which loadout they want to set as active or edit
  loadout-selection-gui:
    # The title of the gui
    title: '<gold>Viewing loadouts'
    # Configure the slot for any bedrock players using geyser
    # Uses the loadout's display item for the slot so the <material> field will do nothing here.
    loadout-selection-slot-geyser:
      # Configure the slot for any bedrock players using geyser when the current loadout is active
      active-loadout:
        name: '<gold><name>'
        lore:
          - '<gray>Click to edit this loadout.'
          - '<gray>This is your currently selected loadout.'
        enchantments:
          POWER: 1
        item-flags:
          - 'HIDE_ENCHANTS'
      # Configure the slot for any bedrock players using geyser when the current loadout is inactive
      inactive-loadout:
        name: '<gold><name>'
        lore:
          - '<gray>Click to edit this loadout.'
    # Configure the slot for any players not using geyser
    # Uses the loadout's display item for the slot so the <material> field will do nothing here.
    loadout-selection-slot:
      # Configure the slot for any players not using geyser when the current loadout is active
      active-loadout:
        name: '<gold><name>'
        lore:
          - '<gray>Left click to edit this loadout.'
          - '<gray>Right click to set this loadout as active.'
          - '<gray>This is your currently selected loadout.'
        enchantments:
          POWER: 1
        item-flags:
          - 'HIDE_ENCHANTS'
      # Configure the slot for any players not using geyser when the current loadout is inactive
      inactive-loadout:
        name: '<gold><name>'
        lore:
          - '<gray>Left click to edit this loadout.'
          - '<gray>Right click to set this loadout as active.'
  # This GUI allows for selecting different editing options for a given loadout
  loadout-display-home-gui:
    # The title of the GUI
    # Supports the following placeholders: <loadout-name>
    title: "<gold>Editing Loadout <loadout-name>"
    # Configure the slot players can click to edit the name of their loadout
    edit-name-slot:
      # What message should be sent to players to prompt them for a new name in chat?
      name-input-request-prompt: '<gray>Please type in chat the name you want this loadout to be called, or type <gold>cancel</gold> to cancel:'
      # How to display this slot in a GUI?
      display-item:
        material: OAK_HANGING_SIGN
        name: '<gold>Loadout Display Name'
        lore:
          - "<gold>Click <gray>to change what the loadout's name is."
    # Configure the slot players can click to edit the display item of their loadout
    edit-display-item-slot:
      # This display item doesn't use the `material` key, instead the value is pulled from whatever
      # item is currently being used as the display for the loadout,
      display-item:
        name: '<gold>Loadout Display Item'
        lore:
          - '<gold>Click <gray>to change what item is used to display the loadout.'
    # Configure the slot players can click to toggle the laodout being active
    toggle-loadout-slot:
      # Configure the slot to be shown to players when the loadout they're viewing is currently active.
      active-display-item:
        material: GREEN_STAINED_GLASS_PANE
        name: '<gold>Loadout Active State'
        lore:
          - '<gray>This loadout is currently <green>active</green>.'
      # Configure the slot to be shown to players when the loadout they're viewing is currently inactive.
      inactive-display-item:
        material: RED_STAINED_GLASS_PANE
        name: '<gold>Loadout Active State'
        lore:
          - '<gray>This loadout is currently <red>inactive</red>.'
          - '<gray>Click to set this loadout as your active loadout.'
  # This GUI allows for players to put an item into the GUI to set it as the display item for their GUI
  loadout-display-item-input-gui:
    title: '<gold>Input Loadout Display Item'
    # Configure the slot that surrounds the input slot
    item-input-highlight-slot:
      display-item:
        material: PURPLE_STAINED_GLASS_PANE
        name: ""
    # Configure the slot players can click to cancel editing the loadout's display item
    cancel-item-edit-slot:
      display-item:
        material: BARRIER
        name: '<gold>Cancel editing loadout display item.'
        lore:
          - '<gold>Click <gray>to cancel editing loadout display item.'
    # Configure the slot players can click to confirm the loadout's new display item
    confirm-item-edit-slot:
      display-item:
        material: GREEN_STAINED_GLASS_PANE
        name: '<gold>Loadout Display Item'
        lore:
          - '<gold>Click <gray>to change what item is used to display the loadout.'
  # This GUI allows players to select abilities to put into their loadouts.
  loadout-ability-select-gui:
    title: '<gold>Select ability to use.'
    # Configure the slot players click to add an ability to their loadout.
    ability-select-slot:
      # The item displayed is from the ability's display, but this lore is appended to let players know what to do
      additional-lore:
        - '<gray>Click to add this ability to your loadout.</gray>'
  # This GUI allows players to toggle their different settings.
  player-setting-gui:
    # The title of the gui
    title: '<gold>Editing Settings'
    # Configure the slot representing the experience display setting controlling how players can get experience updates visually.
    experience-display-setting-slot:
      # Configure the setting display for when the setting is set to BOSS_BAR
      boss-bar:
        display-item:
          material: DRAGON_HEAD
          name: '<gold>Experience Display'
          lore:
            - '<gray>Displays gained experience through a boss bar.'
            - ''
            - '<gold>Click <gray>to change this display setting.'
      # Configure the setting display for when the setting is set to ACTION_BAR
      action-bar:
        display-item:
          material: BLAZE_ROD
          name: '<gold>Experience Display'
          lore:
            - '<gray>Displays gained experience through an action abr.'
            - ''
            - '<gold>Click <gray>to change this display setting.'
    # Configure the slot representing the setting controlling if picked up items will go into a player's empty hand or not.
    keep-hand-empty-setting-slot:
      # Configure the setting display for when the setting is ENABLED
      enabled:
        display-item:
          material: GREEN_STAINED_GLASS_PANE
          name: '<gold>Keep Hand Empty'
          lore:
            - '<gray>Status: <green>Enabled</green>.'
            - '<gray>Prevents picked up items from going into your hand if it is empty.'
            - ''
            - '<gold>Click <gray>to change this setting.'
      # Configure the setting display for when the setting is DISABLED
      disabled:
        display-item:
          material: RED_STAINED_GLASS_PANE
          name: '<gold>Keep Hand Empty'
          lore:
            - '<gray>Status: <red>Disabled</red>.'
            - '<gray>Lets picked up items go into your hand.'
            - ''
            - '<gold>Click <gray>to change this setting.'
    # Configure the slot representing the setting controlling if a dedicated hotbar slot will skip having items automatically added to it.
    keep-hotbar-slot-empty-setting-slot:
      # Configure the setting display for when the setting is DISABLED
      disabled:
        display-item:
          material: RED_SHULKER_BOX
          name: '<gold>Keep Hotbar Slot Empty'
          lore:
            - '<gray>Status: <red>Disabled</red>.'
            - ''
            - '<gold>Click <gray>to enable this setting.'
      # Configure the setting display for when the setting is ENABLED for a specific slot
      enabled:
        # The count of the display item will be automatically incremented to indicate what slot is being reserved.
        # Ex) an item stack count of 8 to represent the 8th hotbar slot.
        # Supported placeholders: <slot>
        display-item:
          material: GREEN_SHULKER_BOX
          name: '<gold>Keep Hotbar Slot Empty'
          lore:
            - '<gray>Empty Slot: <gold><slot></gold>.'
            - '<gray>Prevents picked up items going into the designated slot.'
            - ''
            - '<gold>Click <gray>to change this setting.'
    # Configure the slot representing the setting controlling the player's McRPG locale
    locale-setting-slot:
      # Configure the setting display for when the setting is set to use the player's client locale.
      client-locale:
        display-item:
          material: DIRT
          name: '<gold>Client Language'
          lore:
            - '<gray>Tries to use your client language for McRPG where possible.'
            - ''
            - '<gold>Click <gray>to change this display setting.'
      # Configure the setting display for when the setting is set to use the server's default locale.
      server-locale:
        display-item:
          material: COMPASS
          name: '<gold>Server Language'
          lore:
            - '<gray>Tries to use the server default language for McRPG where possible.'
            - ''
            - '<gold>Click <gray>to change this display setting.'
      # Configure the setting display for when no other locale option is used
      fallback-locale:
        display-item:
          material: OAK_HANGING_SIGN
          name: "<gold><locale>"
          lore:
            - "<gray>Tries to use <locale> for McRPG where possible."
            - ''
            - '<gold>Click <gray>to change this display setting.'
    # Configure the slot representing the setting if the player needs an empty offhand to activate an ability
    require-empty-offhand-to-active-ability-slot:
      # Configure the setting display for when the setting is DISABLED
      disabled:
        display-item:
          material: RED_STAINED_GLASS_PANE
          name: '<gold>Require Empty Offhand'
          lore:
            - '<gray>Status: <red>Disabled</red>.'
            - '<gray>Abilities can not be readied if you have an item in your offhand.'
            - ''
            - '<gold>Click <gray>to enable this setting.'
      # Configure the setting display for when the setting is ENABLED for a specific slot
      enabled:
        # The count of the display item will be automatically incremented to indicate what slot is being reserved.
        # Ex) an item stack count of 8 to represent the 8th hotbar slot.
        # Supported placeholders: <slot>
        display-item:
          material: GREEN_STAINED_GLASS_PANE
          name: '<gold>Require Empty Offhand'
          lore:
            - '<gray>Status: <green>Enabled</green>.'
            - '<gray>Abilities can be readied even with an item in your offhand.'
            - ''
            - '<gold>Click <gray>to change this setting.'
  # This GUI allows players to configure the allowlist of blocks for Remote Transfer.
  remote-transfer-gui:
    title: "<gold>Toggling Remote Transfer Items"
    # These categories should match exactly to the ones in the mining_configuration.yml.
    # The "all" category is an internal concept that acts as the combination of all configured categories.
    # If any category is defined in the mining_configuration.yml but not here, you will get errors.
    categories:
      all:
        # The name to use for the <remote-transfer-category> placeholder.
        name: "All"
        display-item:
          # The material to use for the category-button when displaying this category.
          material: ENDER_CHEST
          # Supports the following placeholders: <remote-transfer-category>
          display-item:
            name: "<red>Click to change sort category."
            lore:
              - "<gray>Current Category: <gold><remote-transfer-category>"
      nether:
        name: "Nether"
        display-item:
          material: MAGMA_BLOCK
          display-item:
            name: "<red>Click to change sort category."
            lore:
              - "<gray>Current Category: <gold><remote-transfer-category>"
      caves:
        name: "Caves"
        display-item:
          material: AMETHYST_BLOCK
          display-item:
            name: "<red>Click to change sort category."
            lore:
              - "<gray>Current Category: <gold><remote-transfer-category>"
      end:
        name: "End"
        display-item:
          material: ENDER_PEARL
          display-item:
            name: "<red>Click to change sort category."
            lore:
              - "<gray>Current Category: <gold><remote-transfer-category>"
      ocean:
        name: "Ocean"
        display-item:
          material: PRISMARINE
          display-item:
            name: "<red>Click to change sort category."
            lore:
              - "<gray>Current Category: <gold><remote-transfer-category>"
      ores:
        name: "Ores"
        display-item:
          material: DIAMOND_ORE
          display-item:
            name: "<red>Click to change sort category."
            lore:
              - "<gray>Current Category: <gold><remote-transfer-category>"
      overworld:
        name: "Overworld"
        display-item:
          material: MOSSY_COBBLESTONE
          display-item:
            name: "<red>Click to change sort category."
            lore:
              - "<gray>Current Category: <gold><remote-transfer-category>"
      terracotta:
        name: "Terracotta"
        display-item:
          material: TERRACOTTA
          display-item:
            name: "<red>Click to change sort category."
            lore:
              - "<gray>Current Category: <gold><remote-transfer-category>"
    # What button should be used to display an option for a category
    # This will be all the allowed items configured in the mining_configuration.yml
    # The display item will be the item configured over there with no edits to the name.
    category-item-option:
      # What lore to add if the option is currently enabled.
      option-enabled:
        # Supports the following placeholders: <remote-transfer-category>
        display-item:
          lore:
            - '<gray>Click to toggle the filter state for this item.'
            - '<gray>Item is currently <green>enabled</green>.'
            - '<gray>Category: <gold><remote-transfer-category>'
      # What lore to add if the option is currently disabled.
      option-disabled:
        # Supports the following placeholders: <remote-transfer-category>
        display-item:
          lore:
            - '<gray>Click to toggle the filter state for this item.'
            - '<gray>Item is currently <red>disabled</red>.'
            - '<gray>Category: <gold><remote-transfer-category>'
    # Configure the slot to toggle all blocks in an entire category
    toggle-entire-category-slot:
      # Configure the slot to be displayed to enable all items in the category.
      toggle-to-be-enabled:
        display-item:
          material: GREEN_STAINED_GLASS_PANE
          name: '<gold>Click to toggle all items</gold>'
          lore:
            - '<gray>Click to toggle all items in the current category to be <green>enabled</green>.'
      # Configure the slot to be displayed to disabled all items in the category.
      toggle-to-be-disabled:
        display-item:
          material: RED_STAINED_GLASS_PANE
          name: '<gold>Click to toggle all items</gold>'
          lore:
            - '<gray>Click to toggle all items in the current category to be <red>disabled</red>.'
  # This GUI allows players to view all of their banked special types of exp
  # such as rested, boosted, redeemable, etc.
  experience-bank-gui:
    # What should the displayed title of this GUI be
    title: '<gold>Experience Bank'
    # This slot allows players to open the GUI for redeeming redeemable experience
    redeemable-experience-slot:
      display-item:
        name: "<gold>Redeemable Experience"
        material: EXPERIENCE_BOTTLE
        lore:
          - '<gray>Redeemable Experience: <gold><redeemable-experience>'
          - ''
          - '<gold>Click <gray>to spend your redeemable experience.'
    # This slot allows players to open the GUI for redeeming redeemable levels
    redeemable-levels-slot:
      display-item:
        name: "<gold>Redeemable Levels"
        material: ENCHANTED_BOOK
        lore:
          - '<gray>Redeemable Experience: <gold><redeemable-levels>'
          - ''
          - '<gold>Click <gray>to spend your redeemable levels.'
        settings:
          glowing: true
    # This slot allows players to view information about their boosted experience
    boosted-experience-slot:
      example-base-amount: 100
      display-item:
        name: "<gold>Boosted Experience Bank"
        material: BEACON
        lore:
          - '<gray>Boosted Experience: <gold><boosted-experience>'
          - '<gray>Usage Rate: <gold><boosted-experience-usage-rate>'
          - ''
          - '<gray>All experience gained is boosted. This lasts'
          - '<gray>until your banked experience is drained.'
          - '<gray>Example: Gaining <gold><example-base-amount></gold> exp will be boosted to'
          - '<gray>to <gold><example-boosted-amount></gold>, taking <gold><example-consumed-amount></gold> exp from the bank.'
    # This slot allows players to view information about their rested experience
    rested-experience-slot:
      example-base-amount: 100
      display-item:
        name: "<gold>Rested Experience Bank"
        material: LIME_BED
        lore:
          - '<gray>Rested Experience: <gold><rested-experience> Level(s)'
          - '<gray>Usage Rate: <gold><rested-experience-usage-rate>'
          - ''
          - '<gray>All experience gained is boosted. This lasts'
          - '<gray>until your banked experience is drained.'
          - "<gray>Example: If you're <gold>50%</gold> towards next level,"
          - "<gray>your exp gain will be <gold>x<rested-experience-usage-rate></gold> until you level up."
          - '<gray>This will consume <gold>0.5</gold> from your banked levels'
# Configure ability placeholders, display items and other text/items.
ability:
  # Configure messages relating to abilities that can be on cooldown
  cooldown:
    # The message to send to the player when they try to use an ability still on cooldown
    # Supports <ability> as a placeholder for the ability on cooldown.
    ability-still-on-cooldown: "<red><ability> is still on cooldown."
    # The message to send to the player whenever an ability is no longer on cooldown
    # Supports <ability> as a placeholder for the ability that was on cooldown.
    ability-no-longer-on-cooldown: "<gold><ability> <gray>is now off cooldown!"
  # Configure additional lore lines for ability items that will be appended to ability item lore when conditions are met
  lore:
    # Configure ability upgrade quest lore
    # The following placeholders are supported: <ability-points>, <next-tier-ability-points>, <upgrade-quest-progress>
    quest:
      # The lore to add when an ability can be upgraded via upgrade quest but the player lacks enough ability points
      not-enough-ability-points:
        - '<gray>You need <gold><next-tier-ability-points> ability points<gray> to start the upgrade quest.'
      #  The lore to add to prompt a player to click when an ability can be upgraded via upgrade quest
      click-to-start:
        - '<green>Click to spend <gold><next-tier-upgrade-points> upgrade points</gold> to start upgrade quest.'
      # The lore to add when an ability has an active upgrade quest
      quest-progress:
        - '<gray>Upgrade Quest Progress: <upgrade-quest-progress>'
    # The lore to add when the player isn't high enough level to upgrade the ability.
    # The following placeholders are supported: <upgrade-points>, <next-tier-level>
    upgrade-locked-behind-levelup:
      - '<gray>You can upgrade this ability once you reach <gold>Lv <next-tier-level><gray> in <gold>>skill><gray>.'
    # The lore to add to show how many upgrade points the player has.
    # The following placeholders are supported: <ability-point-count>
    ability-point-count:
      - '<gray>You currently have <gold><ability-point-count></gold> upgrade points.'
    ability-locked:
      - '<gray>Unlock this ability when your <gold><skill></gold> skill'
      - '<gray>reaches level <gold><ability-unlock-level></gold>.'
    # The lore to add to show what expansion pack an ability is from (only will be displayed if it isn't from McRPG)
    # The following placeholders are supported: <expansion-pack>
    expansion-pack:
      - '<gray>Expansion Pack: <gold><expansion-pack>'
