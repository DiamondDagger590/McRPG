#######################################
#
# Configure localization for players.

# Certain messages will contain placeholders using the
# <> format. This format is for any native placeholders supported
# by McRPG.
#
# If PAPI is enabled, then you may also use PAPI placeholders
# for messages in this file as well.
#
#######################################
#
# Configure messages for McRPG commands
commands:
  # Configure experience commands
  experience:
    # Configure the experience give command
    # Supports the following placeholders: <experience>, <skill>, <target>, <sender>
    give-command:
      # The message to send to the player getting experience.
      recipient-message: "<green>You have been given <gold><experience></gold> in <gold><skill></gold>."
      # The message to send to the sender when the command works.
      sender-success-message: "<green>You gave <gold><experience></gold> in <gold><skill></gold> to <target>."
      # The message to send to the sender when the command fails.
      sender-error-message: "<red>Unable to give <gray><player></gray> experience at the moment."
# Configure McRPG expansions
expansion:
  # What is the display name for the McRPG content expansion?
  mcrpg: 'McRPG'
# Configure messages for player login
login:
  # The message to send a player whenever there is an issue loading their McRPG data.
  unable-to-load-data: "<red>There was an issue loading your McRPG data, logging back into the server may fix this issue. If that does not fix the issue, please contact a server admin!"
# Configure experience display localization
experience-display:
  # The message to send to a player's action bar whenever they gain experience.
  # Valid placeholders are <skill>, <level>, <current-experience>, <required-experience-for-next-level> and <remaining-experience-for-next-level>
  action-bar-display-message: "<gray><skill> Lv. <gold><level></gold> - Needed Exp <gold><required-experience-for-next-level></gold>"
  # The message to send to display as the boss bar's name when sent to a player.
  # Valid placeholders are <skill>, <level>, <current-experience>, <required-experience-for-next-level> and <remaining-experience-for-next-level>
  boss-bar-display-message: "<gray><skill> Lv. <gold><level></gold> - Needed Exp <gold><required-experience-for-next-level></gold>"
# Configure generic ability strings.
ability:
  # Configure messages relating to abilities that can be on cooldown
  cooldown:
    # The message to send to the player when they try to use an ability still on cooldown
    # Supports <ability> as a placeholder for the ability on cooldown.
    ability-still-on-cooldown: "<red><ability> is still on cooldown."
    # The message to send to the player whenever an ability is no longer on cooldown
    # Supports <ability> as a placeholder for the ability that was on cooldown.
    ability-no-longer-on-cooldown: "<gold><ability> <gray>is now off cooldown!"
  # Configure additional lore lines for ability items that will be appended to ability item lore when conditions are met
  lore:
    # Configure ability upgrade quest lore
    # The following placeholders are supported: <upgrade-points>, <next-tier-upgrade-points>, <upgrade-quest-progress>
    quest:
      # The lore to add when an ability can be upgraded via upgrade quest but the player lacks enough upgrade points
      not-enough-upgrade-points:
        - '<gray>You need <gold><next-tier-upgrade-points> upgrade points<gray> to start the upgrade quest.'
      #  The lore to add to prompt a player to click when an ability can be upgraded via upgrade quest
      click-to-start:
        - '<green>Click to spend <gold><next-tier-upgrade-points> upgrade points</gold> to start upgrade quest.'
      # The lore to add when an ability has an active upgrade quest
      quest-progress:
        - '<gray>Upgrade Quest Progress: <upgrade-quest-progress>'
    # The lore to add when the player isn't high enough level to upgrade the ability.
    # The following placeholders are supported: <upgrade-points>, <next-tier-level>
    upgrade-locked-behind-levelup:
      - '<gray>You can upgrade this ability once you reach <gold>Lv <next-tier-level><gray> in <gold>>skill><gray>.'
    # The lore to add to show how many upgrade points the player has.
    # The following placeholders are supported: <upgrade-point-amount>
    ability-point-count:
      - '<gray>You currently have <gold><upgrade-point-amount></gold> upgrade points.'
    # The lore to add to show what expansion pack an ability is from (only will be displayed if it isn't from McRPG)
    # The following placeholders are supported: <expansion-pack>
    expansion-pack:
      - '<gray>Expansion Pack: <expansion-pack>'
  sort-types:
    alphabetical:
      display-item:
        name: "<red>Alphabetical Sort"
        material: BAMBOO_HANGING_SIGN
        lore:
          - '<gray>Click to change how abilities are sorted.'
    innate-abilities:
      display-item:
        name: "<red>Innate Abilities Sort"
        material: REDSTONE
        lore:
          - '<gray>Click to change how abilities are sorted.'
    skill:
      display-item:
        name: "<red>Sort by Skill"
        material: DIAMOND_SWORD
        lore:
          - '<gray>Click to change how abilities are sorted.'
    unlocked-abilities:
      display-item:
        name: "<red>Sort by Unlock Level"
        material: DIAMOND
        lore:
          - '<gray>Click to change how abilities are sorted.'
    upgradable-abilities:
      display-item:
        name: "<red>Sort by Abilities you can upgrade"
        material: DIAMOND
        lore:
          - '<gray>Click to change how abilities are sorted.'
    passive-abilities:
      display-item:
        name: "<red>Sort by Passive Abilities"
        material: GHAST_TEAR
        lore:
          - '<gray>Click to change how abilities are sorted.'
    active-abilities:
      display-item:
        name: "<red>Sort by Active Abilities"
        material: STONE_SWORD
        lore:
          - '<gray>Click to change how abilities are sorted.'
  ability-specific-localization:
    # Configure localization for the Bleed ability
    bleed:
      display-item:
        # Allows you to configure how this ability's name will be displayed
        name: "<red><ability></red>"
        # The name of this ability to be displayed across McRPG
        ability-name: "Bleed"
        material: REDSTONE
        # Supports the following placeholders: <skill>, <activation-chance>
        lore:
          - '<gray>Inflicts the <red>Bleed</red> status on an enemy when attacking'
          - 'with sword, dealing damage over time.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Activation Chance: <gold><activation-chance>'
    # Configure localization for the Deeper Wound ability
    deeper-wound:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Deeper Wound"
        material: RED_DYE
        # Supports the following placeholders: <skill>, <activation-chance>, <additional-bleed-cycles>, <tier>
        lore:
          - '<gray>Enhances Bleed ability to last longer.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Activation Chance: <gold><activation-chance>'
          - '<gray>Additional Bleed Cycles: <gold><additional-bleed-cycles>'
    # Configure localization for the Enhanced Bleed ability
    enhanced-bleed:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Enhanced Bleed"
        material: SPIDER_EYE
        lore:
          - '<gray>Enhances Bleed ability to do more damage each tick, with a chance to deal bonus damage.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Base Damage Boost: <gold><base-damage-boost>'
          - '<gray>Bonus Damage Chance: <gold><bonus-damage-chance>'
          - '<gray>Bonus Damage: <gold><bonus-damage>'
    rage-spike:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Rage Spike"
        material: IRON_SWORD
        lore:
          - '<gray>Ready your sword, then crouch to blast forward, damaging and knocking back foes.'
          - ''
          - '<gray>Skill: <gold><skill>'
          - '<gray>Tier: <gold><tier>'
          - '<gray>Damage: <gold><damage>'
    serrated-strikes:
      display-item:
        name: "<red><ability></red>"
        ability-name: "Serrated Strikes"
        material: STONE_SWORD
        lore:
          - '<gray>Ready your sword and attack an enemy to increase Bleed activation chance.'
