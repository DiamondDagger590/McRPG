# Generic, scalable ability upgrade quests (one per tierable ability).
#
# These quests are intended to be REPEATABLE and scale their required progress using the `{tier}`
# variable supplied at quest-start time (target tier = currentTier + 1).
#
# Reward type `mcrpg:ability_upgrade_next_tier` upgrades the ability to the next tier on completion.
#
# Tier-specific override quests (e.g. `mcrpg:enhanced_bleed_tier3`) may be defined separately and
# referenced via ability config if desired.

quests:
  # ────────────────────────────────────────────
  #  Swords
  # ────────────────────────────────────────────
  mcrpg:enhanced_bleed_upgrade:
    scope: mcrpg:single_player
    repeat-mode: REPEATABLE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade_next_tier
        ability: mcrpg:enhanced_bleed
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:enhanced_bleed_upgrade_stage
            objectives:
              objective:
                key: mcrpg:enhanced_bleed_upgrade_objective
                type: mcrpg:mob_kill
                required-progress: "20*(tier^2)"
                config:
                  entities: [SPIDER, CAVE_SPIDER]

