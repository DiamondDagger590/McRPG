# Default ability upgrade quests for Swords abilities.
#
# These quests are referenced by the ability configs via their "upgrade-quest" key.
# Server owners can customize objectives, required progress, and rewards freely.
# Each tier has its own quest so objectives can differ per tier.
#
# The mcrpg:ability_upgrade reward type handles the actual tier progression,
# attribute cleanup, and cascading next-tier auto-start.

quests:
  # ────────────────────────────────────────────
  #  Enhanced Bleed
  # ────────────────────────────────────────────
  mcrpg:enhanced_bleed_t2:
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:enhanced_bleed
        tier: 2
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:eb_t2_kill
            objectives:
              objective:
                key: mcrpg:eb_t2_kill_spiders
                type: mcrpg:mob_kill
                required-progress: 80
                config:
                  entities:
                    - SPIDER
                    - CAVE_SPIDER

