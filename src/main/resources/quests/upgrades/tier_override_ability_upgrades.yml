# Tier-specific override quests for tierable abilities (tiers 2–5).
#
# These quests are ONCE-per-tier and use the fixed-tier reward type:
#   type: mcrpg:ability_upgrade
#
# They are intended to be referenced via ability config keys:
#   tier-2.upgrade-quest: "mcrpg:<ability>_tier2"
#   ...
#
# The generic `*_upgrade` quests remain as a fallback (e.g. for future tiers).

