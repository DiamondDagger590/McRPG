  #  Swords
  # ────────────────────────────────────────────
  mcrpg:enhanced_bleed_tier2:
    scope: mcrpg:single_player
    repeat-mode: ONCE
    rewards:
      upgrade:
        type: mcrpg:ability_upgrade
        ability: mcrpg:enhanced_bleed
        tier: 2
    phases:
      phase:
        completion-mode: ALL
        stages:
          stage:
            key: mcrpg:enhanced_bleed_tier2_stage
            objectives:
              objective:
                key: mcrpg:enhanced_bleed_tier2_objective
                type: mcrpg:mob_kill
